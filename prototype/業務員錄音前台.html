<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>業務員錄音前台 — MLI 高齡錄音系統</title>
<!-- Google Fonts (load async to not block rendering) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  :root{
    --primary:rgb(73,99,250);
    --primary-2:rgb(131,143,249);
    --primary-3:rgb(164,176,255);
    --primary-soft:rgb(238,242,255);
    --primary-soft-2:rgb(245,246,255);
    --primary-bg:rgb(249,250,255);
    --ink:rgb(41,47,84);
    --ink-2:rgb(74,78,103);
    --ink-3:rgb(103,106,127);
    --ink-4:rgb(140,142,157);
    --line:rgb(229,230,235);
    --line-2:rgb(239,239,242);
    --line-3:rgb(209,210,220);
    --danger:rgb(234,82,82);
    --danger-soft:rgb(255,236,236);
    --warn:rgb(241,160,40);
    --warn-soft:rgb(255,245,222);
    --ok:rgb(72,153,61);
    --ok-soft:rgb(231,247,229);
    --header-h:50px;
    --shadow-sm:0 1px 2px rgba(65,96,97,.10);
    --shadow:0 4px 14px rgba(65,96,97,.10);
    --shadow-lg:0 12px 32px rgba(41,47,84,.14);
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#e6e8ef;color:var(--ink);font-family:inherit;font-size:14px}
  body{min-height:100vh;overflow-x:hidden}
  /* Fixed 1440 design width, scaled to fit viewport */
  .scaler{transform-origin:top left;width:1440px;position:relative}
  .app{width:1440px;background:#f5f6fa;display:flex;flex-direction:column;min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit;padding:0}
  input,select,textarea{font-family:inherit;color:var(--ink)}
  ::selection{background:var(--primary-soft);color:var(--ink)}

  /* ─────────── Utility ─────────── */
  .ff-mont{font-family:"Montserrat",sans-serif}
  .tabular{font-variant-numeric:tabular-nums}

  /* ─────────── Buttons (matching design system pill style) ─────────── */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    height:40px;padding:0 22px;border-radius:20px;
    font:500 16px/1 "Noto Sans TC",sans-serif;letter-spacing:.04em;
    box-shadow:1px 1px 5px rgba(0,0,0,.12);transition:all .15s ease;
    border:1px solid transparent;white-space:nowrap}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:rgb(60,86,237)}
  .btn-ghost{background:#fff;color:var(--primary);border:1px solid var(--primary)}
  .btn-ghost:hover{background:var(--primary-soft)}
  .btn-soft{background:var(--primary-soft);color:var(--primary);box-shadow:none}
  .btn-soft:hover{background:rgb(227,234,255)}
  .btn-quiet{background:transparent;color:var(--ink-3);box-shadow:none;border:1px solid var(--line)}
  .btn-quiet:hover{background:var(--primary-soft-2);color:var(--ink)}
  .btn-danger{background:#fff;color:var(--danger);border:1px solid var(--danger)}
  .btn-danger:hover{background:var(--danger-soft)}
  .btn-warn{background:rgb(255,159,53);color:#fff}
  .btn-warn:hover{background:rgb(238,141,33)}
  .btn-sm{height:32px;padding:0 14px;font-size:14px;border-radius:16px}
  .btn-lg{height:48px;padding:0 28px;font-size:17px;border-radius:24px}
  .btn:disabled,.btn[aria-disabled="true"]{background:var(--line-2);color:var(--ink-4);
    border-color:transparent;box-shadow:none;cursor:not-allowed;transform:none}
  .btn:disabled:hover,.btn[aria-disabled="true"]:hover{transform:none;background:var(--line-2)}

  /* Tags / chips */
  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;
    font:500 12px/1.4 "Noto Sans TC",sans-serif;border-radius:12px;
    background:var(--primary-soft);color:var(--primary);white-space:nowrap}
  .tag-ok{background:var(--ok-soft);color:var(--ok)}
  .tag-warn{background:var(--warn-soft);color:rgb(178,104,12)}
  .tag-danger{background:var(--danger-soft);color:var(--danger)}
  .tag-gray{background:var(--line-2);color:var(--ink-3)}
  .tag-ink{background:rgb(238,240,250);color:var(--ink-2)}

  /* Field */
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font:500 13px/1 "Noto Sans TC",sans-serif;color:var(--ink-2);letter-spacing:.04em}
  .input{height:40px;padding:0 14px;border-radius:8px;border:1px solid var(--line);
    background:#fff;font:400 14px/1 "Noto Sans TC",sans-serif;color:var(--ink);outline:none;
    transition:border-color .15s ease,box-shadow .15s ease}
  .input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(73,99,250,.12)}
  .input::placeholder{color:var(--ink-4)}

  /* ─────────── Layout ─────────── */
  .page{max-width:1440px;margin:0 auto;width:100%}

  /* ─────────── Header (matches /external-shared/Head6) ─────────── */
  .hdr{height:50px;background:var(--primary);display:flex;align-items:center;
    padding:0 40px 0 30px;color:#fff;gap:24px;position:relative;z-index:10}
  .hdr-brand{display:flex;align-items:center;gap:14px}
  .hdr-brand .sub{font-family:Montserrat,sans-serif;font-size:11px;letter-spacing:.18em;
    color:rgba(255,255,255,.7);font-weight:500;line-height:1}
  .hdr-brand .name{display:flex;align-items:baseline;gap:8px}
  .hdr-brand .audio-label{font-family:Montserrat,sans-serif;font-size:19px;font-weight:700;
    letter-spacing:.05em;line-height:1}
  .hdr-divider{width:1px;height:18px;background:rgba(255,255,255,.32)}
  .hdr-nav{display:flex;align-items:center;gap:0;margin-left:8px}
  .hdr-nav button{padding:0 18px;height:50px;font:500 14px/1 "Noto Sans TC",sans-serif;
    color:rgba(255,255,255,.86);letter-spacing:.04em;position:relative}
  .hdr-nav button:hover{color:#fff;background:rgba(255,255,255,.06)}
  .hdr-nav button.active{color:#fff}
  .hdr-nav button.active::after{content:"";position:absolute;left:18px;right:18px;bottom:0;
    height:3px;background:#fff;border-radius:2px}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:18px;
    font:500 14px/1 "Noto Sans TC",sans-serif;color:#fff}
  .hdr-right .help{opacity:.7;cursor:pointer}
  .hdr-right .help:hover{opacity:1}
  .hdr-user{display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 4px;border-radius:6px}
  .hdr-user:hover{background:rgba(255,255,255,.08)}
  .hdr-user .avatar{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.18);
    display:grid;place-items:center;font-size:11px}

  /* Sub-header / breadcrumb bar */
  .subhdr{background:#fff;border-bottom:1px solid var(--line);padding:18px 40px;
    display:flex;align-items:center;gap:14px}
  .subhdr h1{margin:0;font:700 22px/1.2 "Noto Sans TC",sans-serif;color:var(--ink);letter-spacing:.03em}
  .crumb{display:flex;align-items:center;gap:8px;font:400 13px/1 "Noto Sans TC";color:var(--ink-3)}
  .crumb svg{flex-shrink:0}

  /* ─────────── Card ─────────── */
  .card{background:#fff;border-radius:14px;box-shadow:var(--shadow-sm);
    border:1px solid var(--line-2)}

  /* footer */
  .ftr{padding:18px 0 26px;text-align:center;font:400 12px/1 "Noto Sans TC";color:var(--ink-4);
    letter-spacing:.04em}

  /* ─────────── Mic SVG ─────────── */
  .mic-svg{display:block}

  /* Waveform bars */
  @keyframes wf {
    0%,100%{transform:scaleY(.30)}
    50%{transform:scaleY(1)}
  }
  .wf{display:flex;align-items:center;gap:3px;height:48px}
  .wf span{display:block;width:3px;height:100%;border-radius:2px;background:var(--primary);
    transform-origin:center;animation:wf 1.2s ease-in-out infinite}
  .wf-static span{animation:none;transform:scaleY(.4);background:var(--ink-4)}

  /* mic pulse */
  @keyframes pulse {
    0%{box-shadow:0 0 0 0 rgba(73,99,250,.45)}
    70%{box-shadow:0 0 0 22px rgba(73,99,250,0)}
    100%{box-shadow:0 0 0 0 rgba(73,99,250,0)}
  }
  .pulse{animation:pulse 1.8s ease-out infinite}

  /* fade-in for screens — opt-in via .fadeup; immediately visible (animation disabled to avoid layout-recalc conflicts) */
  @keyframes fadeup {from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none}}
  .fadeup{opacity:1}

  /* spinner */
  @keyframes spin {to{transform:rotate(360deg)}}
  .spin{animation:spin .9s linear infinite}

  /* tooltip-ish small text */
  .meta{font:400 12px/1.4 "Noto Sans TC";color:var(--ink-4)}

  /* Range slider */
  input[type=range].rng{appearance:none;width:100%;height:4px;background:var(--line);
    border-radius:2px;outline:none}
  input[type=range].rng::-webkit-slider-thumb{appearance:none;width:16px;height:16px;
    border-radius:50%;background:var(--primary);cursor:pointer;border:2px solid #fff;
    box-shadow:0 1px 4px rgba(73,99,250,.4)}

  /* F-code legend toggle */
  html.hide-fcodes .fcode-legend{display:none !important}

  /* hide tweaks button area */

</style>

(function(){
  function fit(){
    var s=document.querySelector('.scaler');
    if(!s)return;
    var vw=window.innerWidth||document.documentElement.clientWidth;
    var scale=vw/1440;
    s.style.transform='scale('+scale+')';
    s.style.transformOrigin='top left';
    document.body.style.height=(s.offsetHeight*scale)+'px';
  }
  fit();
  window.addEventListener('resize',fit);
  if(typeof ResizeObserver!=='undefined'){
    new ResizeObserver(fit).observe(document.querySelector('.scaler')||document.body);
  }
})();

// 案件範例資料 + 題目腳本
//
// 編碼邏輯：
//   錄音編號 = A + YYYYMMDD + XXXX(4 碼流水號)，例：A202605210001
//
// 審核狀態（v2 — 對齊 v1 待確認 #4 結論，5 種）：
//   draft        草稿     — 業務員建立但尚未送出審核

// 錄音對象（3 種角色）：

//   insured    被保險人
//   payer      繳款人
//   * 達到高齡條件（≥ 65 歲）才需錄音
//   * 三角色可能皆為同一人，也可能皆不同人；UI 顯示時去重合併
//
// 保單號：僅當「審核通過」且「核保成功」時才會由後端核發，其它狀態為 null。

window.__MLI_STATUS = {

};

// 高齡錄音門檻
window.__MLI_AGE_THRESHOLD = 65;

// Helper：把 3 角色去重合併，回傳 [{ roles:[縮寫], name, age, needsRecording }]
window.__MLI_uniqueSubjects = function (caseInfo) {
  const order = [
    ["proposer", "要", "要保人"],
    ["insured",  "被", "被保險人"],
    ["payer",    "繳", "繳款人"],
  ];
  const map = new Map();
  order.forEach(([k, abbr, full]) => {
    const r = caseInfo.roles && caseInfo.roles[k];
    if (!r) return;
    const key = `${r.name}__${r.age}`;
    if (map.has(key)) {
      const item = map.get(key);
      item.roles.push(abbr);
      item.rolesFull.push(full);
    } else {
      map.set(key, {
        roles: [abbr], rolesFull: [full],
        name: r.name, age: r.age, idNo: r.idNo,
        needsRecording: r.age >= window.__MLI_AGE_THRESHOLD,
      });
    }
  });
  return [...map.values()];
};

// ── recProgress.js ──
// recProgress.js — 案件錄音進度的狀態模型與純函式助手
//
// 進度物件（以 recordingNo 為 key 存於 app 狀態）：
//   {
//     method: "segmented" | "whole" | null,   // 首場決定後鎖定，不可中途變更
//     subjects: [ {key, name, idNo, roleKeys} ],   // 排序固定
//     q:     { [subjectKey]: { [qNo]: "pending"|"recorded"|"skipped" } },  // 分題
//     whole: { [subjectKey]: "pending"|"recorded"|"uploaded" },            // 整段/上傳
//     sessions: [ {keys:[...], method} ],   // 已完成場次（音檔數依此計）
//     status: "draft" | "reviewing",
//   }

function progInit(subjects) {
  const q = {}, whole = {};
  (subjects || []).forEach(s => { q[s.key] = {}; whole[s.key] = "pending"; });
  return { method: null, subjects: subjects || [], q, whole, sessions: [], status: "draft" };
}

// 單一對象是否完成
function progSubjectDone(prog, key, totalQ) {
  if (!prog) return false;
  if (prog.method === "whole") {
    const w = prog.whole[key];
    return !!w && w !== "pending";
  }
  // segmented：全部題目皆 recorded 或 skipped
  const qm = prog.q[key] || {};
  for (let n = 1; n <= totalQ; n++) {
    const st = qm[n];
    if (st !== "recorded" && st !== "skipped") return false;
  }
  return true;
}

// 單一對象的分題計數
function progSubjectCount(prog, key, totalQ) {
  const qm = (prog && prog.q[key]) || {};
  let rec = 0, sk = 0;
  for (let n = 1; n <= totalQ; n++) {
    if (qm[n] === "recorded") rec++;
    else if (qm[n] === "skipped") sk++;
  }
  return { rec, sk, done: rec + sk, pending: totalQ - rec - sk };
}

// 對象是否「已開始但未完成」（分題用）
function progSubjectStarted(prog, key, totalQ) {
  if (!prog) return false;
  if (prog.method === "whole") return false;
  return progSubjectCount(prog, key, totalQ).done > 0;
}

// 全案是否完成（可送出）
function progAllDone(prog, totalQ) {
  if (!prog || !prog.method || !prog.subjects.length) return false;
  return prog.subjects.every(s => progSubjectDone(prog, s.key, totalQ));
}

// 完成狀態 map：{ key: bool }
function progDoneMap(prog, totalQ) {
  const m = {};
  if (prog) prog.subjects.forEach(s => { m[s.key] = progSubjectDone(prog, s.key, totalQ); });
  return m;
}

// 已完成對象數 / 總數
function progSubjectSummary(prog, totalQ) {
  if (!prog) return { done: 0, total: 0 };
  const done = prog.subjects.filter(s => progSubjectDone(prog, s.key, totalQ)).length;
  return { done, total: prog.subjects.length };
}

// 寫入一場分題錄音的題目狀態到指定對象們（只存 recorded/skipped，其餘視為 pending）
function progWriteSegmented(prog, keys, recQuestions) {
  const q = { ...prog.q };
  keys.forEach(k => {
    const m = { ...(q[k] || {}) };
    recQuestions.forEach(r => {
      m[r.no] = (r.status === "recorded" || r.status === "skipped") ? r.status : "pending";
    });
    q[k] = m;
  });
  return { ...prog, q };
}

// 統一「錄音進度」顯示：不論動態（新流程）或靜態（示範案）都輸出一致結構
//   回傳 { method:'segmented'|'whole', subjects:[{key,name,roleAbbrs,done,total,complete,status}], dynamic }
function buildDisplayProgress(caseInfo, prog, totalQ) {
  const abbrOf = (k) => (window.CASE_ROLE_MAP && window.CASE_ROLE_MAP[k] ? window.CASE_ROLE_MAP[k].abbr : k);
  // 動態（走過新錄音流程的案）
  if (prog && prog.subjects && prog.subjects.length) {
    const method = prog.method || (caseInfo.channel && caseInfo.channel.startsWith("Web") ? "whole" : "segmented");
    const total = method === "whole" ? 1 : totalQ;
    const subjects = prog.subjects.map(s => {
      const done = method === "whole"
        ? ((prog.whole[s.key] && prog.whole[s.key] !== "pending") ? 1 : 0)
        : progSubjectCount(prog, s.key, totalQ).done;
      const complete = done >= total;
      return { key: s.key, name: s.name, roleAbbrs: (s.roleKeys || []).map(abbrOf),
        done, total, complete, status: complete ? "done" : done > 0 ? "active" : "pending" };
    });
    return { method, subjects, dynamic: true };
  }
  // 靜態（示範案，無逐對象資料）—依通路推測方式，依狀態推測完成度
  const uniq = window.__MLI_uniqueSubjects(caseInfo);
  const method = caseInfo.channel && caseInfo.channel.startsWith("Web") ? "whole" : "segmented";
  const total = method === "whole" ? 1 : totalQ;
  const st = caseInfo.status;
  const caseComplete = ["reviewing", "approved", "returned", "resubmit"].includes(st);
  const agg = (caseInfo.progress ? (caseInfo.progress.recorded || 0) + (caseInfo.progress.skipped || 0) : 0);
  const subjects = uniq.map((s, i) => {
    let done = 0;
    if (caseComplete) done = total;
    else if (st === "draft") done = method === "whole" ? (i === 0 && agg > 0 ? 1 : 0) : (i === 0 ? Math.min(agg, total) : 0);
    const complete = done >= total;
    return { key: s.idNo || s.name, name: s.name, roleAbbrs: s.roles || [],
      done, total, complete, status: complete ? "done" : done > 0 ? "active" : "pending" };
  });
  return { method, subjects, dynamic: false };
}

Object.assign(window, {
  progInit, progSubjectDone, progSubjectCount, progSubjectStarted,
  progAllDone, progDoneMap, progSubjectSummary, progWriteSegmented, buildDisplayProgress,
});

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : {
      [keyOrEdits]: val
    };
    setValues(prev => ({
      ...prev,
      ...edits
    }));
    window.parent.postMessage({
      type: '__edit_mode_set_keys',
      edits
    }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', {
      detail: edits
    }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({
  title = 'Tweaks',
  noDeckControls = false,
  children
}) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(() => typeof document !== 'undefined' && !!document.querySelector('deck-stage'), []);
